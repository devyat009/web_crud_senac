<div class="p-4">
  <h5 class="mb-3 text-dark-teal fw-bold">{{ data.title || 'Confirmação' }}</h5>
  <p class="mb-4 text-secondary">{{ data.message || 'Tem certeza que deseja continuar?' }}</p>
  <div class="d-flex justify-content-end gap-2">
    <button type="button" class="btn btn-outline-secondary px-4" (click)="onCancel()">
      {{ data.cancelText || 'Cancelar' }}
    </button>
    <button type="button" class="btn btn-teal px-4" (click)="onConfirm()">
      {{ data.confirmText || 'Confirmar' }}
    </button>
  </div>
</div>
