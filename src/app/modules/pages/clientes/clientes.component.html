<div class="container-fluid min-vh-100" style="background: #263238;">

  <!-- Content -->
  <div class="container-fluid px-4 py-4">
    <div class="bg-white rounded-4 shadow-sm p-4">
      <!-- Header -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="text-dark-teal mb-0">Clientes</h3>
        <button class="btn btn-success d-flex align-items-center gap-2" (click)="adicionarCliente()">
          <span>Adicionar</span>
          <i class="bi bi-plus-lg"></i>
        </button>
      </div>

      <div class="row mb-3">
        <div class="col-md-4">
          <input
            type="text"
            class="form-control"
            placeholder="Pesquisar por nome, CPF ou e-mail"
            [(ngModel)]="filtroPesquisa"
            (input)="aplicarFiltro()"
          />
        </div>
      </div>

      <!-- Table -->
      <div class="table-responsive">
        <table class="table table-hover">
          <thead class="table-dark-teal">
            <tr>
              <th>Nome</th>
              <th>CPF</th>
              <th>Email</th>
              <th>Data de Nascimento</th>
              <th>Perfil</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let cliente of clientesPaginados">
              <td>{{ cliente.nome }}</td>
              <td>{{ cliente.cpf | mask:'000.000.000-00' }}</td>
              <td>{{ cliente.email }}</td>
              <td>{{ cliente.data_nascimento }}</td>
              <td>{{ cliente.perfil }}</td>
              <td>
                <button class="btn btn-sm btn-outline-primary me-2" (click)="editarCliente(cliente)">
                  <i class="bi bi-pencil"></i>
                </button>
                <button class="btn btn-sm btn-outline-danger" (click)="excluirCliente(cliente)">
                  <i class="bi bi-trash"></i>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
        <!-- Paginação -->
        <nav *ngIf="clientesFiltrados.length > itensPorPagina" class="mt-3">
          <ul class="pagination justify-content-center">
            <li class="page-item" [class.disabled]="paginaAtualClientes === 1">
              <button class="page-link" (click)="mudarPaginaClientes(paginaAtualClientes - 1)"
                [disabled]="paginaAtualClientes === 1">Anterior</button>
            </li>
            <li class="page-item" *ngFor="let p of getPaginasArray(clientesPageCount); let i = index"
              [class.active]="paginaAtualClientes === i + 1">
              <button class="page-link" (click)="mudarPaginaClientes(i + 1)">{{ i + 1 }}</button>
            </li>
            <li class="page-item" [class.disabled]="paginaAtualClientes === clientesPageCount">
              <button class="page-link" (click)="mudarPaginaClientes(paginaAtualClientes + 1)"
                [disabled]="paginaAtualClientes === clientesPageCount">Próxima</button>
            </li>
          </ul>
        </nav>
      </div>
    </div>
  </div>
</div>
