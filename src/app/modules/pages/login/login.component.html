<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center" style="background: #263238;">
  <div class="row w-100">
    <div class="col-md-7 d-none d-md-flex align-items-center justify-content-center">
      <div class="bg-light w-100 h-75 d-flex align-items-center justify-content-center" style="min-height: 400px;">
        <span class="text-muted">placeholder image</span>
      </div>
    </div>
    <div class="col-md-5 d-flex align-items-center justify-content-center">
      <div class="card p-4 shadow-sm" style="min-width: 350px; border-radius: 10px;">
        <div class="card-body">
          <h4 class="mb-4 text-center">Login</h4>
          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="mb-3 input-group">
              <span class="input-group-text bg-white border-end-0">
                <i class="bi bi-envelope"></i>
              </span>
              <input id="email" formControlName="email" type="email" class="form-control border-start-0" placeholder="Digite o e-mail cadastrado" />
            </div>
            <div class="mb-2 input-group">
              <span class="input-group-text bg-white border-end-0">
                <i class="bi bi-key"></i>
              </span>
              <input id="senha" formControlName="senha" type="password" class="form-control border-start-0" placeholder="Digite sua senha cadastrada" />
            </div>
            <div class="mb-3 text-end">
              <a href="#" class="small text-decoration-underline">esqueci minha senha...</a>
            </div>
            <button type="submit" class="btn btn-teal w-100 mb-3">
              Login <i class="bi bi-arrow-right ms-2"></i>
            </button>
          </form>
          <div class="mb-2 mt-3 fw-semibold text-center">
            Ainda não é cadastrado? Se registre para desfrutar de nossos serviços.
          </div>
          <button class="btn btn-outline-teal w-100" (click)="toggleCreate = !toggleCreate">
            Criar Conta <i class="bi bi-arrow-right ms-2"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
