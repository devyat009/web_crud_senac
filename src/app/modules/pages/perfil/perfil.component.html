<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card shadow-sm">
        <div class="card-body">
          <h4 class="mb-3">Completar dados cadastrais</h4>
          <form [formGroup]="form" (ngSubmit)="salvar()">
            <div class="mb-3">
              <label class="form-label">Nome</label>
              <input class="form-control" formControlName="nome" [class.is-invalid]="isInvalid('nome')" />
            </div>
            <div class="mb-3">
              <label class="form-label">E-mail</label>
              <input class="form-control" formControlName="email" [disabled]="true" />
            </div>
            <div class="mb-3">
              <label class="form-label">Telefone</label>
              <input class="form-control" formControlName="telefone" [class.is-invalid]="isInvalid('telefone')" placeholder="Somente números" />
            </div>
            <div class="mb-3">
              <label class="form-label">CPF</label>
              <input class="form-control" formControlName="cpf" placeholder="Somente números" />
            </div>
            <div class="mb-3">
              <label class="form-label">Data de nascimento</label>
              <input type="date" class="form-control" formControlName="data_nascimento" [class.is-invalid]="isInvalid('data_nascimento')" />
            </div>
            <div class="d-flex justify-content-end gap-2">
              <button type="button" class="btn btn-light" (click)="goHome()">Cancelar</button>
              <button type="submit" class="btn btn-teal">Salvar</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
