<div class="container-fluid min-vh-100" style="background: #263238;">
  <!-- Content -->
  <div class="container-fluid px-4 py-4">
    <div class="row">
      <!-- Filtros Sidebar -->
      <div class="col-md-3 mb-4">
        <div class="bg-white rounded-4 shadow-sm p-3">
          <div class="mb-3">
            <input type="text" class="form-control" placeholder="Pesquisar" [(ngModel)]="filtroSearch">
          </div>
          <div class="mb-3">
            <label class="form-label">Categoria</label>
            <select class="form-select" [(ngModel)]="filtroCategoria">
              <option value="">Selecione...</option>
              <option *ngFor="let cat of categorias" [value]="cat.id_category">{{cat.nome_categoria}}</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Marca</label>
            <select class="form-select" [(ngModel)]="filtroMarca">
              <option value="">Selecione...</option>
              <option *ngFor="let marca of marcas" [value]="marca.id_brand">{{marca.nome_marca}}</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Preço</label>
            <div class="d-flex gap-2">
              <input type="number" class="form-control" placeholder="Min" [(ngModel)]="filtroPrecoMin">
              <span class="align-self-center">a</span>
              <input type="number" class="form-control" placeholder="Max" [(ngModel)]="filtroPrecoMax">
            </div>
          </div>
          <button class="btn btn-dark-teal w-100" (click)="aplicarFiltro()">
            Aplicar Filtro
          </button>
        </div>
      </div>

      <!-- Main Content -->
      <div class="col-md-9">
        <div class="bg-white rounded-4 shadow-sm p-4">
          <!-- Header -->
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="text-dark-teal mb-0">Produtos</h3>
            <button class="btn btn-teal d-flex align-items-center gap-2" (click)="adicionarProduto()">
              <span>Adicionar</span>
              <i class="bi bi-plus-lg"></i>
            </button>
          </div>

          <!-- Table -->
          <div class="table-responsive">
            <table class="table table-hover">
              <thead class="table-dark-teal">
                <tr>
                  <th>Nome</th>
                  <th>Categoria</th>
                  <th>Modelo</th>
                  <th>Quantidade</th>
                  <th>Preço</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let produto of produtosPaginados">
                  <td>{{ produto.nome_item }}</td>
                  <td>{{ produto.nome_categoria }}</td>
                  <td>{{ produto.modelo }}</td>
                  <td>{{ produto.quantidade }}</td>
                  <td>{{ produto.preco | currency:'BRL':'symbol':'1.2-2':'pt-BR' }}</td>
                  <td>
                    <button class="btn btn-sm btn-outline-primary me-2" (click)="editarProduto(produto)">
                      <i class="bi bi-pencil"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-danger" (click)="excluirProduto(produto)">
                      <i class="bi bi-trash"></i>
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
          <!-- Paginação -->
          <nav *ngIf="produtosFiltrados.length > itensPorPagina" class="mt-3">
            <ul class="pagination justify-content-center">
              <li class="page-item" [class.disabled]="paginaAtualProdutos === 1">
                <button class="page-link" (click)="mudarPaginaProdutos(paginaAtualProdutos - 1)" [disabled]="paginaAtualProdutos === 1">Anterior</button>
              </li>
              <li class="page-item" *ngFor="let p of getPaginasArray(produtosPageCount); let i = index"
                  [class.active]="paginaAtualProdutos === i + 1">
                <button class="page-link" (click)="mudarPaginaProdutos(i + 1)">{{ i + 1 }}</button>
              </li>
              <li class="page-item" [class.disabled]="paginaAtualProdutos === produtosPageCount">
                <button class="page-link" (click)="mudarPaginaProdutos(paginaAtualProdutos + 1)" [disabled]="paginaAtualProdutos === produtosPageCount">Próxima</button>
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </div>
  </div>
</div>
